<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>入职准备 - 网易互娱校招生指南</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/onboarding.css">
</head>
<body>
    <!-- 模块：入职准备 -->
    <div class="module-page onboarding-module">
        <!-- 顶部导航 -->
        <header class="module-header">
            <button class="back-btn" onclick="goHome()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            <h1>入职准备</h1>
        </header>

        <!-- 主内容区域 -->
        <main class="module-content">
            <!-- 工作地选择 -->
            <section class="location-section" id="section-location">
                <h2>📍 请选择您的工作地</h2>
                <div class="location-selector">
                    <button class="location-btn active" data-location="guangzhou">
                        <span class="location-icon">🏢</span>
                        <span class="location-name">广州</span>
                    </button>
                    <button class="location-btn" data-location="shanghai">
                        <span class="location-icon">🏢</span>
                        <span class="location-name">上海</span>
                    </button>
                    <button class="location-btn" data-location="hangzhou">
                        <span class="location-icon">🏢</span>
                        <span class="location-name">杭州</span>
                    </button>
                </div>
                <p class="location-hint">请根据您的offer选择对应的工作地，不同园区的办理流程可能有所不同</p>
            </section>

            <!-- 档户处理 -->
            <section class="process-section" id="section-dossier">
                <div class="section-header">
                    <h2>📁 档户处理</h2>
                    <span class="status-tag">重要</span>
                </div>
                <div class="process-content" id="dossier-content">
                    <!-- 内容将通过JavaScript动态加载 -->
                    <div class="loading-placeholder">
                        <p>请先选择工作地</p>
                    </div>
                </div>
            </section>

            <!-- 团员关系管理 -->
            <section class="process-section" id="section-league">
                <div class="section-header">
                    <h2>🎗️ 团员关系管理</h2>
                    <span class="status-tag optional">团员必看</span>
                </div>
                <div class="process-content" id="league-content">
                    <!-- 内容将通过JavaScript动态加载 -->
                    <div class="loading-placeholder">
                        <p>请先选择工作地</p>
                    </div>
                </div>
            </section>

            <!-- 党关系转移 -->
            <section class="process-section" id="section-party">
                <div class="section-header">
                    <h2>🎖️ 党关系转移</h2>
                    <span class="status-tag optional">党员必看</span>
                </div>
                <div class="process-content" id="party-content">
                    <!-- 内容将通过JavaScript动态加载 -->
                    <div class="loading-placeholder">
                        <p>请先选择工作地</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- 阅读导航 -->
        <nav class="reading-nav">
            <div class="nav-toggle">
                <span class="nav-icon">📖</span>
                <span class="nav-text">目录</span>
            </div>
            <div class="nav-items">
                <a href="#section-location" class="nav-item active" data-section="section-location">
                    <span class="nav-dot"></span>
                    <span class="nav-label">工作地选择</span>
                </a>
                <a href="#section-dossier" class="nav-item" data-section="section-dossier">
                    <span class="nav-dot"></span>
                    <span class="nav-label">档户处理</span>
                </a>
                <a href="#section-league" class="nav-item" data-section="section-league">
                    <span class="nav-dot"></span>
                    <span class="nav-label">团员关系管理</span>
                </a>
                <a href="#section-party" class="nav-item" data-section="section-party">
                    <span class="nav-dot"></span>
                    <span class="nav-label">党关系转移</span>
                </a>
            </div>
        </nav>
    </div>

    <script src="js/onboarding.js"></script>
</body>
</html>
