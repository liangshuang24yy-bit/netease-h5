<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>网易互娱校招生指南</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
    <!-- 首页 -->
    <div class="home-page">
        <!-- 欢迎区域 -->
        <header class="welcome-section">
            <div class="welcome-content">
                <div class="welcome-icon">🎉</div>
                <h1>欢迎加入网易</h1>
                <p>2026届校招生通关手册</p>
            <div class="welcome-decoration"></div>
            </div>
        </header>

        <!-- 倒计时 -->
        <section class="countdown-section">
            <div class="countdown-content">
                <div class="countdown-icon">⏳</div>
                <div class="countdown-text">
                    <p>距离入职还有</p>
                    <div class="countdown-number">
                        <span id="days-count">--</span>
                        <span class="countdown-unit">个月</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 快捷导航 -->
        <section class="navigation-section">
            <h2>🚀 快捷导航</h2>
            <div class="nav-grid">
                <a href="company.html" class="nav-item">
                    <div class="nav-icon">🏢</div>
                    <span class="nav-text">公司初识</span>
                </a>
                <a href="onboarding.html" class="nav-item">
                    <div class="nav-icon">📋</div>
                    <span class="nav-text">入职准备</span>
                </a>
                <a href="housing.html" class="nav-item">
                    <div class="nav-icon">🏠</div>
                    <span class="nav-text">安居指南</span>
                </a>
                <a href="courses.html" class="nav-item">
                    <div class="nav-icon">📚</div>
                    <span class="nav-text">新人必修</span>
                </a>
                <a href="hrgsoc.html" class="nav-item">
                    <div class="nav-icon">💬</div>
                    <span class="nav-text">找HRGSOC</span>
                </a>
            </div>
        </section>

        <!-- 热门推送 -->
        <section class="news-section">
            <h2>📢 本周热门推送</h2>
            <div class="news-list">
                <a href="company.html#section-vr" class="news-item">
                    <div class="news-icon">🌍</div>
                    <div class="news-content">
                        <p class="news-title">公司园区长什么样儿？</p>
                        <p class="news-desc">VR全景带你云游三大园区</p>
                    </div>
                    <div class="news-arrow">›</div>
                </a>
                <a href="onboarding.html#section-dossier" class="news-item">
                    <div class="news-icon">📋</div>
                    <div class="news-content">
                        <p class="news-title">离校前必看！档户处理easy job！</p>
                        <p class="news-desc">超详细办理流程指引</p>
                    </div>
                    <div class="news-arrow">›</div>
                </a>
                <a href="housing.html#section-renting" class="news-item">
                    <div class="news-icon">🏠</div>
                    <div class="news-content">
                        <p class="news-title">租房攻略来了！</p>
                        <p class="news-desc">广州、上海、杭州三地租房指南</p>
                    </div>
                    <div class="news-arrow">›</div>
                </a>
            </div>
        </section>

        <!-- 快速搜索 -->
        <section class="search-section">
            <div class="search-box">
                <input type="text" placeholder="搜索关键词..." class="search-input">
                <button class="search-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                </button>
            </div>
        </section>

        <!-- 底部信息 -->
        <footer class="home-footer">
            <p>© 2026 HRGSOC 版权所有</p>
            <p class="version-info">版本 v1.0.0 | 更新于 2026-03-16</p>
        </footer>
    </div>

    <script src="js/home.js"></script>
</body>
</html>
